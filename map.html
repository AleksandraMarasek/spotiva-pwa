<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spotiva Mapa</title>

  <link rel="manifest" href="./manifest.json" />
  <meta name="theme-color" content="#0d6efd" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="./css/styles.css" />
  <link rel="stylesheet" href="./css/offline.css" />
</head>
<body>
  <div id="offline-banner" role="alert" aria-live="assertive">
    <span class="ob-icon">📡</span>
    <div class="ob-text">
      <strong>Jesteś offline</strong>
      <span>Mapa wymaga połączenia z internetem - kafelki mogą nie być widoczne</span>
    </div>
    <span class="ob-badge">Offline</span>
  </div>

  <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
      <a class="navbar-brand" href="./index.html">
        <img src="cos tu bedzie" alt="Spotiva" height="40"
          style="object-fit:contain; filter:drop-shadow(0 1px 3px rgba(0,0,0,0.18));" />
      </a>
      <div class="navbar-nav">
        <a class="nav-link" href="./index.html">Dodaj</a>
        <a class="nav-link" href="./gallery.html">Galeria</a>
        <a class="nav-link active" href="./map.html">Mapa</a>
      </div>
    </div>
  </nav>

  <main class="container py-4">
    <h1 class="h3 mb-4">Mapa miejsc</h1>

    <div id="map-wrapper">
      <div id="map"></div>
      <div id="map-overlay" role="status" aria-live="polite">
        <div class="ov-icon">🗺️</div>
        <strong>Mapa niedostępna</strong>
        <p>Połącz się z internetem, aby załadować kafelki mapy i zobaczyć zapisane miejsca.</p>
        <div class="ov-pill">Brak połączenia</div>
      </div>
    </div>
  </main>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="./js/storage.js"></script>
  <script src="./js/map.js"></script>
  <script src="./js/pwa.js"></script>
  <script src="./js/offline.js"></script>
</body>
</html>
