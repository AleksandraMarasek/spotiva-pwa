<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spotiva - spot share shine</title>

  <link rel="manifest" href="./manifest.json" />
  <meta name="theme-color" content="#0d6efd" />

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />
  <link rel="stylesheet" href="./css/styles.css" />
  <link rel="stylesheet" href="./css/camera-modal.css" />
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
      <a class="navbar-brand" href="./index.html">
        <img src="./icons/pagelogo.png" alt="FotoMapa" height="40"
          style="object-fit:contain; filter:drop-shadow(0 1px 3px rgba(0,0,0,0.18));" />
      </a>
      <div class="navbar-nav">
        <a class="nav-link active" href="./index.html">Dodaj</a>
        <a class="nav-link" href="./gallery.html">Galeria</a>
        <a class="nav-link" href="./map.html">Mapa</a>
      </div>
    </div>
  </nav>

  <main class="container py-4">
    <div class="row justify-content-center">
      <div class="col-12 col-md-8 col-lg-6">
        <div class="card shadow-sm">
          <div class="card-body">
            <h1 class="h3 mb-3">Dodaj nowe miejsce</h1>

            <div class="mb-3">
              <label for="titleInput" class="form-label">Nazwa miejsca</label>
              <input id="titleInput" class="form-control" type="text" placeholder="Np. Park miejski" />
            </div>

            <div class="mb-3">
              <label class="form-label">Zdjęcie</label>

              <div class="photo-source-btns">
                <button id="openCamBtn" class="btn btn-outline-primary" type="button">
                  Użyj kamery
                </button>
                <label class="btn btn-outline-primary mb-0" style="cursor:pointer;">
                  Wybierz plik
                  <input
                    id="photoInput"
                    type="file"
                    accept="image/*"
                    class="d-none"
                  />
                </label>
              </div>
            </div>

            <div class="mb-3 text-center">
              <img id="photoPreview" class="img-fluid rounded d-none preview-image" alt="Podgląd zdjęcia" />
            </div>

            <div class="d-grid gap-2 mb-3">
              <button id="getLocationBtn" class="btn btn-outline-primary" type="button">
                Pobierz lokalizację GPS
              </button>
            </div>

            <div id="locationStatus" class="alert alert-secondary">
              Lokalizacja nie została jeszcze pobrana.
            </div>

            <div class="d-grid gap-2">
              <button id="savePlaceBtn" class="btn btn-success" type="button">
                Zapisz miejsce
              </button>
            </div>

            <div id="formMessage" class="mt-3"></div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <div id="cam-modal" role="dialog" aria-modal="true" aria-label="Podgląd kamery">
    <div id="cam-box">
      <video id="cam-video" playsinline autoplay muted></video>
      <div id="cam-controls">
        <button id="cam-close"    class="cam-btn" aria-label="Zamknij kamerę">✕</button>
        <button id="cam-capture"  class="cam-btn" aria-label="Zrób zdjęcie"></button>
        <button id="cam-switch"   class="cam-btn" aria-label="Zmień kamerę" style="display:none;">🔄</button>
      </div>
    </div>
  </div>

  <canvas id="cam-canvas"></canvas>

  <script src="./js/storage.js"></script>
  <script src="./js/camera.js"></script>
  <script src="./js/location.js"></script>
  <script src="./js/app.js"></script>
  <script src="./js/pwa.js"></script>
</body>
</html>
